<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment — Hebrew From Zero</title>

<!-- OpenGraph tags (WhatsApp, Facebook, iMessage preview) -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Hebrew From Zero">
<meta property="og:title" content="Hebrew From Zero — Secure Payment">
<meta property="og:description" content="Pay for your Hebrew tutoring session with Danny. Secure checkout via Stripe.">
<meta property="og:image" content="https://learnhebrewfromzero.com/og-payment.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://learnhebrewfromzero.com/pay.html">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Hebrew From Zero — Secure Payment">
<meta name="twitter:description" content="Pay for your Hebrew tutoring session with Danny.">
<meta name="twitter:image" content="https://learnhebrewfromzero.com/og-payment.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Heebo:wght@400;700;800&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Fredoka', sans-serif;
    background: #FFFBEF;
    color: #424242;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    line-height: 1.5;
  }

  .card {
    max-width: 480px;
    width: 100%;
    background: #fff;
    border: 2px solid #2A79C8;
    border-radius: 24px;
    padding: 44px 32px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(42,121,200,0.10);
  }

  .logo {
    width: 96px;
    height: 96px;
    background: #FED009;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 22px;
    box-shadow: 0 6px 0 #F7CE1A;
  }

  .logo-text-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1;
  }

  .logo-line1 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #2A79C8;
    letter-spacing: 0.5px;
  }

  .logo-line2 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: #E03120;
    letter-spacing: 0.3px;
    margin-top: 2px;
  }

  .hebrew {
    font-family: 'Heebo', sans-serif;
    font-weight: 800;
    font-size: 32px;
    color: #E03120;
    margin-bottom: 12px;
    direction: rtl;
  }

  h1 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: #2A79C8;
    margin-bottom: 8px;
  }

  p {
    font-size: 14px;
    font-weight: 500;
    color: #424242;
    margin-bottom: 18px;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #FFFBEF;
    border-top-color: #2A79C8;
    border-radius: 50%;
    margin: 14px auto 0;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .secure {
    font-size: 12px;
    color: #888;
    margin-top: 22px;
  }

  .secure strong { color: #2A79C8; font-weight: 600; }

  .fallback {
    margin-top: 16px;
    font-size: 13px;
    color: #888;
  }

  .fallback a {
    color: #2A79C8;
    font-weight: 600;
    text-decoration: underline;
  }

  @media (max-width: 480px) {
    .card { padding: 32px 22px; }
    h1 { font-size: 22px; }
    .hebrew { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-text-row">
      <div class="logo-line1">HEBREW</div>
      <div class="logo-line2">from zero</div>
    </div>
  </div>

  <div class="hebrew">בית הספר</div>
  <h1>Secure Payment</h1>
  <p>Redirecting you to secure checkout…</p>

  <div class="spinner"></div>

  <div class="secure">
    🔒 Secure checkout powered by <strong>Stripe</strong>
  </div>

  <div class="fallback" id="fallback" style="display:none">
    Not redirected? <a id="manual-link" href="#">Click here to pay</a>
  </div>
</div>

<script>
  // Extract the Stripe checkout URL from the ?to= param
  const params = new URLSearchParams(window.location.search);
  const target = params.get('to');

  if (target && target.startsWith('https://checkout.stripe.com/')) {
    // Show the fallback link in case redirect is blocked
    const fb = document.getElementById('fallback');
    const a = document.getElementById('manual-link');
    a.href = target;
    setTimeout(() => { fb.style.display = 'block'; }, 2500);

    // Redirect after a tiny delay so users see the branded page briefly
    setTimeout(() => { window.location.href = target; }, 800);
  } else {
    document.querySelector('p').textContent = 'Invalid payment link.';
    document.querySelector('.spinner').style.display = 'none';
  }
</script>

</body>
</html>
